<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SPMB SMPN 8 Probolinggo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        const checkIsLoggedIn = localStorage.getItem('isLoggedIn');
        const checkRole = localStorage.getItem('role');

        if (checkIsLoggedIn === 'true') {
            const roleUser = (checkRole || '').toLowerCase().trim();
            if (roleUser === 'siswa') {
                window.location.replace("dashboard-siswa.html");
            } else {
                window.location.replace("dashboard.html");
            }
        }
    </script>

    <style>
        /* === GAYA PREMIUM & RESPONSIVE === */
        body {
            font-family: 'Poppins', sans-serif;
            /* Background image keren dari Unsplash (Tema Edukasi/Kampus) */
            background: url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }
        
        /* Overlay gelap agar form login tetap terbaca jelas */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.65); /* Warna biru dongker transparan */
            z-index: -1;
        }
        
        /* Efek Kaca (Glassmorphism) pada Card */
        .login-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .logo-img {
            width: 85px;
            height: auto;
            margin-bottom: 1rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.08));
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            background-color: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        /* Penyesuaian border-radius untuk input-group (password) */
        .input-group > .form-control {
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
            border-right: none;
        }

        .input-group > .btn {
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            border: 1px solid #e2e8f0;
            border-left: none;
            background-color: #f8fafc;
            color: #64748b;
            transition: all 0.3s;
        }

        .form-control:focus + .btn {
            border-color: #3b82f6;
            background-color: #ffffff;
        }

        .btn-login {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(13, 110, 253, 0.3);
        }

        .form-label {
            color: #475569;
            font-size: 0.9rem;
            margin-bottom: 0.4rem;
        }

        /* Style untuk Credit */
        .credit-text {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
                
                <div class="card login-card p-3 p-md-4">
                    <div class="card-body text-center">
                        
                        <img src="logo.png" alt="Logo SMPN 8" class="logo-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/8074/8074800.png'">
                        
                        <h4 class="fw-bold text-dark mb-1">Simulasi SPMB</h4>
                        <p class="text-muted small mb-4 pb-2">SMP Negeri 8 Probolinggo</p>

                        <form id="loginForm">
                            <div class="mb-4 text-start">
                                <label for="username" class="form-label fw-semibold">Username / Email</label>
                                <div class="input-group shadow-sm">
                                    <span class="input-group-text bg-light border-end-0 rounded-start-3 text-muted">
                                        <i class="bi bi-person"></i>
                                    </span>
                                    <input type="text" class="form-control border-start-0 ps-0" id="username" placeholder="Masukkan username" required>
                                </div>
                            </div>
                            
                            <div class="mb-4 pb-2 text-start">
                                <label for="password" class="form-label fw-semibold">Password</label>
                                <div class="input-group shadow-sm">
                                    <span class="input-group-text bg-light border-end-0 rounded-start-3 text-muted">
                                        <i class="bi bi-lock"></i>
                                    </span>
                                    <input type="password" class="form-control border-start-0 ps-0" id="password" placeholder="Masukkan password" required>
                                    <button class="btn" type="button" id="togglePassword">
                                        <i class="bi bi-eye" id="eyeIcon"></i>
                                    </button>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-login w-100 fw-bold text-white mb-4">
                                Masuk Dashboard <i class="bi bi-arrow-right ms-1"></i>
                            </button>
                            
                            <div class="text-center border-top pt-4 mt-2">
                                <span class="text-muted small d-block mb-1">Belum punya akses?</span>
                                <a href="register.html" class="text-decoration-none fw-bold text-primary small d-inline-block transition-transform" id="btnAjukanAkun" style="transition: 0.2s;">
                                    Ajukan Pembuatan Akun
                                </a>
                            </div>
                        </form>

                    </div>
                </div>

                <div class="text-center mt-4 credit-text">
                    Created by <strong class="fw-bold text-warning ms-1">dhickz666</strong>
                </div>
                
            </div>
        </div>
    </div>

    <script>
        // --- 1. SCRIPT UNTUK TOGGLE MATA (LIHAT PASSWORD) ---
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            if (type === 'password') {
                eyeIcon.classList.remove('bi-eye-slash');
                eyeIcon.classList.add('bi-eye');
            } else {
                eyeIcon.classList.remove('bi-eye');
                eyeIcon.classList.add('bi-eye-slash');
            }
        });

        // --- 2. SCRIPT MENGIRIM DATA LOGIN KE SERVER ---
        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', async function(event) {
            event.preventDefault(); 

            const usernameValue = document.getElementById('username').value;
            const passwordValue = document.getElementById('password').value;

            const btnSubmit = document.querySelector('.btn-login');
            const originalText = btnSubmit.innerHTML;
            
            // Efek loading di tombol
            btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Memproses...';
            btnSubmit.disabled = true;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameValue, password: passwordValue })
                });

                const result = await response.json();

                if (result.success) {
                    // Simpan data ke Local Storage (DISINKRONKAN DENGAN KODE PROTEKSI KITA)
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('user', result.nama);
                    localStorage.setItem('role', result.role);
                    
                    // NORMALISASI ROLE: Antisipasi typo huruf besar/kecil atau spasi lebih di Database
                    const roleUser = (result.role || '').toLowerCase().trim();

                    // SWAL FIRE MEWAH: Sukses Login
                    Swal.fire({
                        title: 'Login Berhasil!',
                        text: `Selamat datang, ${result.nama}`,
                        icon: 'success',
                        timer: 1500, // Otomatis hilang dalam 1.5 detik
                        timerProgressBar: true,
                        showConfirmButton: false,
                        backdrop: `rgba(13, 110, 253, 0.3)` // Efek background biru tipis
                    }).then(() => {
                        // LOGIKA PENGALIHAN (REDIRECT) BERJALAN SETELAH ANIMASI SWAL SELESAI
                        if (roleUser === 'siswa') {
                            window.location.href = 'dashboard-siswa.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    });

                } else {
                    // SWAL FIRE MEWAH: Gagal Login (Username/Pass Salah)
                    Swal.fire({
                        title: 'Akses Ditolak!',
                        text: result.message,
                        icon: 'error',
                        confirmButtonText: 'Coba Lagi',
                        confirmButtonColor: '#dc3545',
                        borderRadius: '15px'
                    });
                    
                    // Kembalikan tombol seperti semula
                    btnSubmit.innerHTML = originalText;
                    btnSubmit.disabled = false;
                }
            } catch (error) {
                console.error("Error:", error);
                
                // SWAL FIRE MEWAH: Server Error
                Swal.fire({
                    title: 'Koneksi Terputus!',
                    text: 'Terjadi kesalahan saat menghubungi server. Pastikan internet stabil.',
                    icon: 'warning',
                    confirmButtonText: 'Oke',
                    confirmButtonColor: '#ffc107'
                });

                // Kembalikan tombol seperti semula
                btnSubmit.innerHTML = originalText;
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
