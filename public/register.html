<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengajuan Akun - SPMB SMPN 8 Probolinggo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            /* Background gradien premium */
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
        }
        .card-premium {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.5);
            /* Tambahan animasi fade-in */
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-control {
            border-radius: 12px;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .form-control:focus {
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(25, 135, 84, 0.1);
            border-color: #198754;
        }
        /* Styling khusus untuk input group password agar menyatu */
        .input-group .form-control:focus {
            z-index: 1;
        }
        .input-group-text.bg-transparent {
            border-radius: 0 12px 12px 0;
            border: 1px solid #e2e8f0;
            border-left: none;
            background-color: #f8fafc;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .input-group:focus-within .input-group-text.bg-transparent {
            background-color: #fff;
            border-color: #198754;
            box-shadow: none; /* Dihilangkan agar tidak dobel dengan form-control */
        }
        .input-group:focus-within .form-control {
            border-right-color: transparent;
        }
        
        .btn-success {
            border-radius: 12px;
            padding: 14px;
            background: linear-gradient(135deg, #198754 0%, #146c43 100%);
            border: none;
            letter-spacing: 0.5px;
        }
        .btn-success:hover {
            background: linear-gradient(135deg, #146c43 0%, #0f5132 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(25, 135, 84, 0.2);
            transition: all 0.3s ease;
        }
        .logo-wrapper {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem auto;
            border-radius: 50%;
            padding: 4px;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center p-3 p-md-0">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
                <div class="card card-premium border-0">
                    <div class="card-body p-4 p-sm-5 text-center">
                        
                        <div class="logo-wrapper">
                            <img src="logo.png" alt="Logo SMPN 8" class="img-fluid rounded-circle" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                        
                        <h4 class="fw-bold text-success mb-1">Pengajuan Akun</h4>
                        <p class="text-muted mb-4 small">SMP Negeri 8 Probolinggo</p>

                        <form id="registerForm">
                            <div class="mb-3 text-start">
                                <label for="namaLengkap" class="form-label fw-semibold text-dark small">Nama Lengkap</label>
                                <input type="text" class="form-control" id="namaLengkap" placeholder="Contoh: Budi Santoso, S.Pd" required>
                            </div>
                            
                            <div class="mb-3 text-start">
                                <label for="newUsername" class="form-label fw-semibold text-dark small">Username Baru</label>
                                <input type="text" class="form-control" id="newUsername" placeholder="Buat username untuk login" required>
                            </div>
                            
                            <div class="mb-4 text-start">
                                <label for="newPassword" class="form-label fw-semibold text-dark small">Password</label>
                                <div class="input-group">
                                    <input type="password" class="form-control border-end-0" id="newPassword" placeholder="Buat password" minlength="6" required>
                                    <span class="input-group-text bg-transparent text-muted" id="togglePassword">
                                        <i class="bi bi-eye-slash" id="eyeIcon"></i>
                                    </span>
                                </div>
                                <div class="form-text small text-muted mt-2">
                                    <span class="text-success fw-medium">Akun didaftarkan sebagai Guru.</span> Menunggu persetujuan admin.
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success w-100 fw-bold mb-4" id="submitBtn">
                                <span id="btnText">Kirim Pengajuan</span>
                                <span id="btnSpinner" class="spinner-border spinner-border-sm d-none ms-2" role="status" aria-hidden="true"></span>
                            </button>
                            
                            <div class="text-center mt-2">
                                <span class="text-muted small">Sudah punya akses?</span>
                                <a href="index.html" class="text-decoration-none text-success fw-bold small ms-1">Kembali Login</a>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        // Fitur Toggle Password Visibility
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('newPassword');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.classList.toggle('bi-eye');
            eyeIcon.classList.toggle('bi-eye-slash');
        });

        // Handle Submit Form
        const registerForm = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');

        registerForm.addEventListener('submit', async function(event) {
            event.preventDefault(); 

            // Ubah state tombol saat loading
            btnText.innerHTML = 'Memproses...';
            btnSpinner.classList.remove('d-none');
            submitBtn.disabled = true;

            const namaValue = document.getElementById('namaLengkap').value;
            const usernameValue = document.getElementById('newUsername').value;
            const passwordValue = document.getElementById('newPassword').value;

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        namaLengkap: namaValue, 
                        username: usernameValue, 
                        password: passwordValue,
                        role: "Guru" 
                    })
                });

                const result = await response.json();

                if (result.success) {
                    // Alert Berhasil dengan SweetAlert2
                    Swal.fire({
                        title: 'Berhasil!',
                        text: result.message || 'Pengajuan akun berhasil dikirim.',
                        icon: 'success',
                        confirmButtonText: 'Kembali ke Login',
                        confirmButtonColor: '#198754',
                        timer: 3000, // Akan otomatis menutup setelah 3 detik jika tidak diklik
                        timerProgressBar: true
                    }).then((result) => {
                        // Redirect otomatis ke index.html setelah popup ditutup atau timer habis
                        window.location.href = 'index.html'; 
                    });
                } else {
                    // Alert Gagal dari Server
                    Swal.fire({
                        title: 'Gagal!',
                        text: result.message || 'Terjadi kesalahan saat mendaftar.',
                        icon: 'error',
                        confirmButtonColor: '#dc3545'
                    });
                }
            } catch (error) {
                console.error("Error:", error);
                // Alert Gagal Jaringan/Koneksi
                Swal.fire({
                    title: 'Koneksi Terputus!',
                    text: 'Gagal menghubungi server. Pastikan koneksi internet stabil.',
                    icon: 'warning',
                    confirmButtonColor: '#f8bb86'
                });
            } finally {
                // Kembalikan tombol seperti semula setelah selesai
                btnText.innerHTML = 'Kirim Pengajuan';
                btnSpinner.classList.add('d-none');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
