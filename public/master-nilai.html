<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Nilai - SPMB SMPN 8 Probolinggo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <style>
        /* === GAYA PREMIUM & RESPONSIVE === */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7fa;
            overflow-x: hidden;
        }
        
        #wrapper { display: flex; width: 100vw; height: 100vh; }
        
        /* Sidebar Mewah */
        #sidebar-wrapper {
            width: 260px;
            flex-shrink: 0;
            transition: all 0.3s ease-in-out;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            z-index: 1050;
        }
        
        #page-content-wrapper {
            flex-grow: 1;
            overflow-y: auto;
            transition: all 0.3s ease-in-out;
            background-color: #f8fafc;
        }

        .sidebar-link {
            color: #94a3b8;
            text-decoration: none;
            padding: 14px 20px;
            display: block;
            border-radius: 12px;
            margin: 8px 15px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            transform: translateX(5px);
        }

        /* Card Premium */
        .card-premium {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.02);
        }

        /* Nav Pills Modern */
        .nav-pills .nav-link {
            border-radius: 12px;
            padding: 10px 24px;
            color: #64748b;
            transition: all 0.3s;
            font-weight: 600;
        }
        .nav-pills .nav-link:hover {
            color: #3b82f6;
            background-color: #f1f5f9;
        }
        .nav-pills .nav-link.active {
            background-color: #0d6efd;
            color: white;
            box-shadow: 0 8px 20px rgba(13, 110, 253, 0.3);
        }

        /* Custom Scrollbar untuk Tabel */
        .table-container { 
            max-height: 55vh; 
            overflow-y: auto; 
            border-radius: 12px;
            border: 1px solid #f1f5f9;
        }
        .table-container::-webkit-scrollbar { width: 6px; height: 6px; }
        .table-container::-webkit-scrollbar-track { background: #f8fafc; border-radius: 8px; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .table th { 
            white-space: nowrap; 
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 1rem;
            background-color: #f8fafc;
            color: #475569;
            border-bottom: 2px solid #e2e8f0;
        }

        .table td {
            padding: 1rem;
            vertical-align: middle;
            color: #334155;
            font-size: 0.95rem;
            border-bottom: 1px solid #f1f5f9;
        }

        /* Responsif HP */
        @media (max-width: 768px) {
            #sidebar-wrapper {
                margin-left: -260px;
                position: fixed;
                height: 100vh;
            }
            #wrapper.toggled #sidebar-wrapper {
                margin-left: 0;
                box-shadow: 10px 0 30px rgba(0,0,0,0.2);
            }
            #wrapper.toggled::after {
                content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.5); z-index: 1040;
            }
            #grupTombolImport {
                justify-content: flex-start !important;
            }
        }
    </style>
</head>
<body>

    <div id="wrapper">
        <div class="text-white shadow-lg" id="sidebar-wrapper">
            <div class="p-4 fw-bold fs-5 border-bottom border-secondary text-center text-white" style="letter-spacing: 1px;">
                🎓 SPMB SMPN 8
            </div>
            <div class="mt-4" id="menuSidebar">
                <a href="dashboard.html" class="sidebar-link"><i class="bi bi-grid-fill me-2"></i> Dashboard</a>
                <a href="master-nilai.html" class="sidebar-link active"><i class="bi bi-file-earmark-spreadsheet-fill me-2"></i> Master Nilai</a>
                <a href="analisis-peluang.html" class="sidebar-link"><i class="bi bi-people-fill me-2"></i> Peluang Siswa</a>
                <a href="hitung-peluang.html" class="sidebar-link"><i class="bi bi-calculator-fill me-2"></i> Hitung Peluang</a>
                
                <a href="kelola-passing-grade.html" class="sidebar-link d-none" id="menuAdminPG"><i class="bi bi-gear-fill me-2"></i> Kelola Passing Grade</a>
            </div>
        </div>

        <div id="page-content-wrapper">
            
            <nav class="navbar navbar-expand-lg bg-white shadow-sm px-4 py-3 sticky-top">
                <div class="d-flex align-items-center w-100 justify-content-between">
                    <div class="d-flex align-items-center gap-3">
                        <button class="btn btn-light d-md-none border-0 shadow-sm" id="menu-toggle">
                            <i class="bi bi-list fs-4"></i>
                        </button>
                        <h5 class="mb-0 fw-bold text-primary d-none d-sm-block">Master Nilai Siswa</h5>
                    </div>
                    
                    <div class="d-flex align-items-center gap-3">
                        <div class="d-none d-md-block text-end">
                            <span class="text-dark fw-bold d-block" id="welcomeText" style="line-height: 1;">User</span>
                            <small class="text-muted" id="roleText">Siswa</small>
                        </div>
                        <button class="btn btn-danger btn-sm rounded-pill fw-bold px-3 shadow-sm" onclick="logout()">
                            <i class="bi bi-power"></i> <span class="d-none d-md-inline">Keluar</span>
                        </button>
                    </div>
                </div>
            </nav>

            <div class="container-fluid p-4 p-md-5">
                
                <div class="row mb-4 align-items-center gy-3">
                    <div class="col-lg-4 col-md-12">
                        <div class="input-group shadow-sm rounded-pill overflow-hidden border">
                            <span class="input-group-text border-0 bg-white text-muted px-3">
                                <i class="bi bi-search"></i>
                            </span>
                            <input type="text" id="searchInput" class="form-control border-0 ps-0" placeholder="Cari nama siswa...">
                        </div>
                    </div>
                    
                    <div class="col-lg-8 col-md-12 d-flex flex-wrap justify-content-lg-end gap-2" id="grupTombolImport">
                        
                        <div class="btn-group shadow-sm" role="group">
                            <button class="btn btn-outline-success fw-bold" onclick="downloadTemplate('Rapor')" title="Download Template Excel Rapor">
                                <i class="bi bi-file-earmark-excel"></i> Template Rapor
                            </button>
                            <button class="btn btn-success fw-bold text-white px-3" onclick="document.getElementById('fileRapor').click()" title="Upload File Rapor">
                                <i class="bi bi-upload"></i> Import
                            </button>
                        </div>
                        <input type="file" id="fileRapor" class="d-none" accept=".xlsx, .xls" onchange="prosesImport('Rapor')">

                        <div class="btn-group shadow-sm" role="group">
                            <button class="btn btn-outline-info fw-bold" onclick="downloadTemplate('TKA')" title="Download Template Excel TKA">
                                <i class="bi bi-file-earmark-excel"></i> Template TKA
                            </button>
                            <button class="btn btn-info fw-bold text-white px-3" onclick="document.getElementById('fileTKA').click()" title="Upload File TKA">
                                <i class="bi bi-upload"></i> Import
                            </button>
                        </div>
                        <input type="file" id="fileTKA" class="d-none" accept=".xlsx, .xls" onchange="prosesImport('TKA')">
                        
                    </div>
                </div>

                <div class="card card-premium">
                    <div class="card-body p-4 p-md-5">
                        
                        <ul class="nav nav-pills mb-4 gap-2" id="pills-tab" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active border" id="pills-rapor-tab" data-bs-toggle="pill" data-bs-target="#pills-rapor" type="button" role="tab">
                                    <i class="bi bi-journal-text me-1"></i> Data Rapor
                                </button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link border" id="pills-tka-tab" data-bs-toggle="pill" data-bs-target="#pills-tka" type="button" role="tab">
                                    <i class="bi bi-clipboard2-check me-1"></i> Data TKA
                                </button>
                            </li>
                        </ul>

                        <div class="tab-content" id="pills-tabContent">
                            
                            <div class="tab-pane fade show active" id="pills-rapor" role="tabpanel">
                                <div class="table-responsive table-container shadow-sm">
                                    <table class="table table-hover align-middle text-center mb-0">
                                        <thead class="sticky-top">
                                            <tr>
                                                <th class="text-start ps-4">No</th>
                                                <th class="text-start">Nama Siswa</th>
                                                <th>Rata-rata</th>
                                                <th>Agama</th>
                                                <th>PKn</th>
                                                <th>B.Indo</th>
                                                <th>MTK</th>
                                                <th>IPA</th>
                                                <th>IPS</th>
                                                <th class="pe-4">B.Inggris</th>
                                            </tr>
                                        </thead>
                                        <tbody id="tabelRapor">
                                            <tr>
                                                <td colspan="10" class="text-muted py-5 text-center">
                                                    <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
                                                    Memuat data rapor...
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <div class="tab-pane fade" id="pills-tka" role="tabpanel">
                                <div class="table-responsive table-container shadow-sm">
                                    <table class="table table-hover align-middle text-center mb-0">
                                        <thead class="sticky-top">
                                            <tr>
                                                <th class="text-start ps-4" style="width: 10%;">No</th>
                                                <th class="text-start" style="width: 60%;">Nama Siswa</th>
                                                <th class="pe-4" style="width: 30%;">Nilai Total TKA</th>
                                            </tr>
                                        </thead>
                                        <tbody id="tabelTKA">
                                            <tr>
                                                <td colspan="3" class="text-muted py-5 text-center">
                                                    <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
                                                    Memuat data TKA...
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                        </div> 
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // --- 1. TOGGLE SIDEBAR UNTUK HP ---
        document.getElementById("menu-toggle").addEventListener("click", function(e) {
            e.preventDefault();
            document.getElementById("wrapper").classList.toggle("toggled");
        });

        document.addEventListener('click', function(event) {
            const wrapper = document.getElementById('wrapper');
            const isClickInsideSidebar = document.getElementById('sidebar-wrapper').contains(event.target);
            const isClickToggle = document.getElementById('menu-toggle').contains(event.target);

            if (wrapper.classList.contains('toggled') && !isClickInsideSidebar && !isClickToggle) {
                wrapper.classList.remove('toggled');
            }
        });

        // --- 2. CEK LOGIN & PENGAMANAN HALAMAN KHUSUS ADMIN ---
        const checkIsLoggedIn = localStorage.getItem('isLoggedIn');
        const checkRole = localStorage.getItem('role'); 
        const userName = localStorage.getItem('user');
        
        if (checkIsLoggedIn !== 'true') {
            window.location.replace('index.html');
        } else if ((checkRole || '').toLowerCase().trim() !== 'admin') {
            window.location.replace('dashboard.html');
        }

        document.getElementById('welcomeText').innerText = userName || 'Admin';
        document.getElementById('roleText').innerText = 'Admin';
        document.getElementById('menuAdminPG').classList.remove('d-none');

        // --- 3. FUNGSI LOGOUT (DENGAN SWEETALERT2) ---
        function logout() {
            Swal.fire({
                title: 'Konfirmasi Keluar',
                text: "Apakah Anda yakin ingin keluar dari sistem?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc3545',
                cancelButtonColor: '#6c757d',
                confirmButtonText: '<i class="bi bi-box-arrow-right"></i> Ya, Keluar',
                cancelButtonText: 'Batal'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.clear(); 
                    window.location.replace('index.html'); 
                }
            });
        }

        // --- 4. AMBIL DATA RAPOR ---
        async function loadDataRapor() {
            try {
                const response = await fetch('/api/data-rapor');
                const result = await response.json();
                const tbody = document.getElementById('tabelRapor');
                tbody.innerHTML = '';

                if (result.success && result.data.length > 0) {
                    result.data.forEach((row, index) => {
                        tbody.innerHTML += `
                            <tr class="data-row">
                                <td class="text-start ps-4 text-muted">${index + 1}</td>
                                <td class="nama-siswa text-start fw-semibold text-dark">${row.nama_siswa}</td>
                                <td><span class="badge bg-primary bg-opacity-10 text-primary rounded-pill px-3 py-2 fs-6 border border-primary">${row.rata_rata || '-'}</span></td>
                                <td>${row.agama || '-'}</td>
                                <td>${row.pkn || '-'}</td>
                                <td>${row.bindo || '-'}</td>
                                <td>${row.mtk || '-'}</td>
                                <td>${row.ipa || '-'}</td>
                                <td>${row.ips || '-'}</td>
                                <td class="pe-4">${row.binggris || '-'}</td>
                            </tr>
                        `;
                    });
                } else {
                    tbody.innerHTML = `<tr><td colspan="10" class="text-muted py-5"><i class="bi bi-inbox fs-2 d-block mb-2 text-secondary"></i>Belum ada data rapor.</td></tr>`;
                }
            } catch (error) {
                console.error("Gagal memuat data rapor:", error);
                document.getElementById('tabelRapor').innerHTML = `<tr><td colspan="10" class="text-danger py-4">Gagal memuat data dari server.</td></tr>`;
            }
        }

        // --- 5. AMBIL DATA TKA ---
        async function loadDataTKA() {
            try {
                const response = await fetch('/api/data-tka');
                const result = await response.json();
                const tbody = document.getElementById('tabelTKA');
                tbody.innerHTML = '';

                if (result.success && result.data.length > 0) {
                    result.data.forEach((row, index) => {
                        tbody.innerHTML += `
                            <tr class="data-row">
                                <td class="text-start ps-4 text-muted">${index + 1}</td>
                                <td class="nama-siswa text-start fw-semibold text-dark">${row.nama_siswa}</td>
                                <td class="pe-4"><span class="badge bg-info bg-opacity-10 text-info border border-info rounded-pill px-3 py-2 fs-6">${row.nilai_total || '-'}</span></td>
                            </tr>
                        `;
                    });
                } else {
                    tbody.innerHTML = `<tr><td colspan="3" class="text-muted py-5"><i class="bi bi-inbox fs-2 d-block mb-2 text-secondary"></i>Belum ada data TKA.</td></tr>`;
                }
            } catch (error) {
                console.error("Gagal memuat data TKA:", error);
                document.getElementById('tabelTKA').innerHTML = `<tr><td colspan="3" class="text-danger py-4">Gagal memuat data dari server.</td></tr>`;
            }
        }

        // Init load data
        loadDataRapor();
        loadDataTKA();

        // --- 6. IMPORT FILE EXCEL (ADMIN) ---
        async function prosesImport(jenis) {
            const inputId = jenis === 'Rapor' ? 'fileRapor' : 'fileTKA';
            const endpoint = jenis === 'Rapor' ? '/api/upload-rapor' : '/api/upload-tka';
            const fileInput = document.getElementById(inputId);
            const file = fileInput.files[0];

            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                document.body.style.cursor = 'wait';
                const response = await fetch(endpoint, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                Swal.fire({
                    icon: result.success ? 'success' : 'error',
                    title: result.success ? 'Berhasil!' : 'Gagal!',
                    text: result.message
                });

                if (result.success) {
                    if (jenis === 'Rapor') loadDataRapor();
                    else loadDataTKA();
                }
            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Kesalahan Jaringan',
                    text: 'Terjadi kesalahan saat mengunggah file. Cek koneksi server.'
                });
            } finally {
                fileInput.value = ''; 
                document.body.style.cursor = 'default';
            }
        }

        // --- 7. PENCARIAN NAMA REAL-TIME ---
        document.getElementById('searchInput').addEventListener('input', function() {
            const filter = this.value.toLowerCase();
            const rows = document.querySelectorAll('.data-row'); 

            rows.forEach(row => {
                const nama = row.querySelector('.nama-siswa').innerText.toLowerCase();
                if (nama.includes(filter)) {
                    row.style.display = ''; 
                } else {
                    row.style.display = 'none'; 
                }
            });
        });

        // --- 8. GENERATE & DOWNLOAD TEMPLATE EXCEL ---
        function downloadTemplate(jenis) {
            let data = [];
            let fileName = "";

            if (jenis === 'Rapor') {
                // Baris pertama adalah header, baris kedua dst adalah contoh isi
                data = [
                    ["nama_siswa", "rata_rata", "agama", "pkn", "bindo", "mtk", "ipa", "ips", "binggris"],
                    ["Budi Santoso", 86.5, 90, 85, 88, 82, 86, 84, 88], 
                    ["Siti Aminah", 88.0, 92, 88, 90, 85, 89, 86, 90]
                ];
                fileName = "Template_Import_Rapor.xlsx";
            } else if (jenis === 'TKA') {
                // Baris pertama adalah header, baris kedua dst adalah contoh isi
                data = [
                    ["nama_siswa", "nilai_total"],
                    ["Budi Santoso", 450], 
                    ["Siti Aminah", 475]
                ];
                fileName = "Template_Import_TKA.xlsx";
            }

            // Membuat worksheet dari array 2D
            const ws = XLSX.utils.aoa_to_sheet(data);

            // Membuat workbook baru dan memasukkan worksheet tadi
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Template " + jenis);

            // Trigger download file ke komputer user
            XLSX.writeFile(wb, fileName);
        }
    </script>
</body>
</html>
